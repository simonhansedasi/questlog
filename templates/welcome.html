{% extends "base.html" %}
{% block title %}Get Started — RippleForge{% endblock %}
{% block content %}
<div style="max-width:600px; margin:48px auto 0; padding:0 16px;">
  <h1 class="page-title" style="text-align:center; margin-bottom:8px;">How would you like to get started?</h1>
  <p class="subtitle" style="text-align:center; margin-bottom:36px;">Pick a path. You can always come back here.</p>

  <div style="display:flex; flex-direction:column; gap:14px;">

    <form method="POST" action="/welcome">
      <button name="choice" value="wizard" type="submit"
              style="width:100%; text-align:left; background:var(--surface); border:2px solid var(--purple);
                     border-radius:8px; padding:20px 24px; cursor:pointer; color:var(--text); font-family:inherit;">
        <div style="font-size:1.05rem; font-weight:700; color:var(--purple); margin-bottom:5px;">Hold my hand</div>
        <div style="font-size:0.88rem; color:var(--muted); line-height:1.5;">
          Step-by-step guided setup. Name your world, add characters, create a conflict, and watch the first relationship form. Done in about two minutes.
        </div>
      </button>
    </form>

    <form method="POST" action="/welcome">
      <button name="choice" value="campaign" type="submit"
              style="width:100%; text-align:left; background:var(--surface); border:2px solid var(--gold);
                     border-radius:8px; padding:20px 24px; cursor:pointer; color:var(--text); font-family:inherit;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
          <span style="font-size:1.05rem; font-weight:700; color:var(--gold);">Campaign mode</span>
          <span style="font-size:0.7rem; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;">async</span>
          <span style="font-size:0.7rem; color:var(--muted); border:1px solid var(--border); border-radius:3px; padding:1px 6px;">3 free plays</span>
        </div>
        <div style="font-size:0.88rem; color:var(--muted); line-height:1.5;">
          Turn-based storytelling across time zones. Invite players by email, each person takes a turn when they're ready, and the AI referee logs the consequences to a living world.
        </div>
      </button>
    </form>

    <form method="POST" action="/welcome">
      <button name="choice" value="deepend" type="submit"
              style="width:100%; text-align:left; background:var(--surface); border:1px solid var(--border);
                     border-radius:8px; padding:20px 24px; cursor:pointer; color:var(--text); font-family:inherit;">
        <div style="font-size:1.05rem; font-weight:700; color:var(--gold); margin-bottom:5px;">Jump in the deep end</div>
        <div style="font-size:0.88rem; color:var(--muted); line-height:1.5;">
          Go straight to your dashboard. Create your world your way.
        </div>
      </button>
    </form>

  </div>
</div>
{% endblock %}
