{% extends "base.html" %}
{% block title %}Add Quest — {{ meta.name }}{% endblock %}
{% block content %}

<p class="text-muted text-sm"><a href="/{{ slug }}/dm">← DM Dashboard</a></p>
<h1 class="page-title" style="margin-top:12px;">Add Quest</h1>

<form method="POST" class="card mt-8" style="max-width:600px; display:flex; flex-direction:column; gap:16px;">
  <div style="display:flex; flex-direction:column; gap:4px;">
    <label style="color:var(--gold); font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">Title *</label>
    <input type="text" name="title" required
           style="background:var(--surface2); border:1px solid var(--border); color:var(--text);
                  border-radius:4px; padding:8px 12px; font-size:0.9rem;">
  </div>

  <div style="display:flex; flex-direction:column; gap:4px;">
    <label style="color:var(--gold); font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">Description</label>
    <textarea name="description" rows="4"
              style="background:var(--surface2); border:1px solid var(--border); color:var(--text);
                     border-radius:4px; padding:8px 12px; font-size:0.9rem; resize:vertical; font-family:inherit;"></textarea>
  </div>

  <p class="text-muted text-sm">Objectives can be added after saving.</p>

  <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:0.9rem; color:var(--muted);">
    <input type="checkbox" name="hidden" checked style="accent-color:var(--gold);">
    Hidden from players
  </label>

  <div style="display:flex; gap:12px; align-items:center; margin-top:8px;">
    <button type="submit"
            style="background:var(--gold); color:#080a18; border:none; border-radius:6px;
                   padding:8px 24px; font-size:0.95rem; font-weight:700; cursor:pointer;">
      Add Quest
    </button>
    <a href="/{{ slug }}/dm" style="color:var(--muted); font-size:0.9rem;">Cancel</a>
  </div>
</form>

{% endblock %}
