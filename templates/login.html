{% extends "base.html" %}
{% block title %}Login — RippleForge{% endblock %}
{% block content %}

<div style="max-width:400px; margin:60px auto 0;">

  <div style="text-align:center; margin-bottom:28px;">
    <h1 style="font-size:2rem; font-weight:800; color:var(--text); letter-spacing:-0.02em; margin:0 0 6px 0;">RippleForge</h1>
    <p style="color:var(--muted); font-size:0.85rem; margin:0;">
      <a href="/" style="color:var(--muted); text-decoration:none;">← Back</a>
      &nbsp;·&nbsp;
      <a href="/demo/" style="color:var(--gold); font-weight:700;">Try the demo</a>
    </p>
  </div>

  <div class="card">
    {% if error %}
    <p style="color:#e05c5c; font-size:0.85rem; margin-bottom:16px;">{{ error }}</p>
    {% endif %}

    <a href="/auth/google"
       style="display:flex; align-items:center; justify-content:center; gap:10px;
              background:#fff; color:#3c4043; border:1px solid #dadce0; border-radius:4px;
              padding:10px 0; font-size:0.95rem; font-weight:600; text-decoration:none;
              cursor:pointer; margin-bottom:6px;">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.174 0 7.548 0 9s.348 2.826.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </a>
    <p style="color:var(--muted); font-size:0.73rem; text-align:center; margin:0 0 18px 0;">Sign in or create a free account — no invite needed.</p>

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:18px;">
      <hr style="flex:1; border:none; border-top:1px solid var(--border);">
      <span style="color:var(--muted); font-size:0.75rem;">or</span>
      <hr style="flex:1; border:none; border-top:1px solid var(--border);">
    </div>

    <form method="POST" action="/login" style="display:flex; flex-direction:column; gap:14px;">
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="color:var(--muted); font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">Username</label>
        <input type="text" name="username" autofocus
               style="background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:8px 12px; font-size:0.95rem; width:100%; box-sizing:border-box;">
      </div>
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="color:var(--muted); font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">Password</label>
        <input type="password" name="password"
               style="background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:8px 12px; font-size:0.95rem; width:100%; box-sizing:border-box;">
      </div>
      <button type="submit"
              style="background:var(--surface2); color:var(--muted); border:1px solid var(--border); border-radius:4px; padding:9px 0; font-size:0.88rem; font-weight:600; cursor:pointer;">
        Log In
      </button>
    </form>
  </div>
</div>

{% endblock %}
