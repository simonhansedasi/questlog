{% extends "base.html" %}
{% block title %}Change Password — RippleForge{% endblock %}
{% block content %}

<div style="max-width:400px; margin:60px auto 0;">
  <h1 class="page-title">Change Password</h1>

  <div class="card">
    {% if success %}
    <p style="color:#7ec87e; font-size:0.9rem; margin-bottom:16px; font-weight:600;">Password updated.</p>
    {% endif %}
    {% if error %}
    <p style="color:#e05c5c; font-size:0.85rem; margin-bottom:16px;">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/account/password" style="display:flex; flex-direction:column; gap:14px;">
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="color:var(--muted); font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">Current Password</label>
        <input type="password" name="current_password" required autofocus
               style="background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:8px 12px; font-size:0.95rem; width:100%; box-sizing:border-box;">
      </div>
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="color:var(--muted); font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">New Password</label>
        <input type="password" name="new_password" required minlength="6"
               style="background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:8px 12px; font-size:0.95rem; width:100%; box-sizing:border-box;">
      </div>
      <div style="display:flex; flex-direction:column; gap:4px;">
        <label style="color:var(--muted); font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">Confirm New Password</label>
        <input type="password" name="confirm_password" required
               style="background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:4px; padding:8px 12px; font-size:0.95rem; width:100%; box-sizing:border-box;">
      </div>
      <button type="submit"
              style="background:var(--gold); color:#080a18; border:none; border-radius:4px; padding:9px 0; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:4px;">
        Update Password
      </button>
    </form>
  </div>
  <p style="text-align:center; margin-top:16px;">
    <a href="/" style="font-size:0.82rem; color:var(--muted);">← Back to campaigns</a>
  </p>
</div>

{% endblock %}
